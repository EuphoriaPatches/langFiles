project_id_env: "CROWDIN_PROJECT_ID_WEBSITE"
api_token_env: "CROWDIN_TOKEN"
base_path: "../../website"

preserve_hierarchy: true

files:
  - source: "/en.json"
    translation: "/%locale_with_underscore%.json"
    type: "json"
    update_option: "update_as_unapproved"

# Every language here has to also be in the crowdin project
# This is a mapping of the crowdin language codes to the ones used in the website.
languages_mapping:
  locale_with_underscore:
    fr: fr
    de: de
    he: he
    ja: ja
    nl: nl
    pl: pl
    ru: ru
    es: es
    sv: sv
    th: th
    tr: tr
    uk: uk
    pt-BR: pt-BR
    es-ES: es-ES
    zh-CN: zh-CN
    zh-HK: zh-HK
