name: "PR Safe Term Command"
run-name: "Safe Term Command #${{ github.run_number }}"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: safe-term-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  safe-term:
    name: "Process /safe-term command"
    runs-on: ubuntu-latest
    # Only on PR comments containing the command, from a trusted association.
    # The precise "/safe-term <term>" parse (handling things like a comment
    # that starts with "/safe-term-typo" instead) happens in the extract
    # step below - this is just a cheap upfront filter.
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/safe-term') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    steps:
      - name: "React to comment"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes' || true

      - name: "Extract term and find PR branch"
        id: extract
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          TERM=$(node -e "
            const body = process.env.COMMENT_BODY || '';
            const m = body.match(/^\/safe-term\s+(.+)\$/m);
            console.log(m ? m[1].trim() : '');
          ")
          if [ -z "$TERM" ]; then
            echo "No valid /safe-term <term> command found in comment - ignoring."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_JSON=$(gh pr view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json headRefName,labels)
          HEAD_REF=$(echo "$PR_JSON" | node -e "console.log(JSON.parse(require('fs').readFileSync(0,'utf8')).headRefName)")
          HAS_LABEL=$(echo "$PR_JSON" | node -e "console.log(JSON.parse(require('fs').readFileSync(0,'utf8')).labels.some(l => l.name === 'translations'))")

          if [ "$HAS_LABEL" != "true" ]; then
            echo "PR doesn't have the 'translations' label - not a flagged-review PR, ignoring."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "term=$TERM" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: "Checkout PR branch"
        if: steps.extract.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.extract.outputs.head_ref }}
          fetch-depth: 0

      - name: "Resolve safe term"
        if: steps.extract.outputs.found == 'true'
        env:
          SAFE_TERM_QUERY: ${{ steps.extract.outputs.term }}
          PROFANITY_REPO_TOKEN: ${{ secrets.PROFANITY_REPO_TOKEN }}
        run: node .github/scripts/resolve-safe-term.js

      - name: "Commit, push, and update PR if resolved"
        if: steps.extract.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_SLUG_LANG: EuphoriaPatchesShader
          CROWDIN_PROJECT_SLUG_WEBSITE: EuphoriaPatchesWebsite
        run: |
          STATUS=$(node -e "console.log(require('./_safe-term-result.json').status)")

          if [ "$STATUS" = "resolved" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add -- '.github/data/safe-term-exceptions.json' '*.lang' 'website/*.json' '_flagged-report.json'
            git commit -m "[translation] Add safe-term exception: ${{ steps.extract.outputs.term }}"
            git push origin "${{ steps.extract.outputs.head_ref }}"

            node .github/scripts/build-pr-body.js
            gh pr edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file pr-body.md

            REMAINING=$(node -e "console.log(require('./_safe-term-result.json').remainingCount)")
            if [ "$REMAINING" = "0" ]; then
              if MERGE_OUTPUT=$(gh pr merge "${{ github.event.issue.number }}" \
                  --repo "${{ github.repository }}" \
                  --merge --delete-branch 2>&1); then
                REPLY="Added \`${{ steps.extract.outputs.term }}\` as a safe-term exception. No flagged items remain (of any kind), so this PR was merged and its branch deleted automatically."
              else
                echo "gh pr merge failed: $MERGE_OUTPUT"
                REPLY="Added \`${{ steps.extract.outputs.term }}\` as a safe-term exception. No flagged items remain, but auto-merge failed (branch protection or required checks?) - see the workflow run for details. Merge manually when ready."
              fi
            else
              REPLY="Added \`${{ steps.extract.outputs.term }}\` as a safe-term exception and re-checked matching flagged item(s). $REMAINING item(s) still need review."
            fi
          elif [ "$STATUS" = "not-found" ]; then
            REPLY="Couldn't find a flagged profanity match for \`${{ steps.extract.outputs.term }}\` in this PR - nothing changed."
          else
            REPLY="Something went wrong processing this command - check the workflow run for details."
          fi

          gh pr comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "$REPLY"
