name: "PR Safe Term Command"
run-name: "Safe Term Command #${{ github.run_number }}"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: safe-term-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  safe-term:
    name: "Process /safe-term, /accept, /reject commands"
    runs-on: ubuntu-latest
    # Only on PR comments containing a command, from a trusted association.
    # The precise per-line "/cmd <term>" parse (handling things like a
    # comment that starts with "/safe-term-typo" instead) happens in the
    # extract step below - this is just a cheap upfront filter.
    if: |
      github.event.issue.pull_request &&
      (contains(github.event.comment.body, '/safe-term') ||
       contains(github.event.comment.body, '/accept') ||
       contains(github.event.comment.body, '/reject')) &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    steps:
      - name: "React to comment"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes' || true

      - name: "Extract commands and find PR branch"
        id: extract
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # One comment can contain several commands, one per line, e.g.:
          #   /safe-term whatever
          #   /reject badWord
          #   /accept this
          COMMANDS=$(node -e "
            const body = process.env.COMMENT_BODY || '';
            const commands = [];
            for (const line of body.split(/\r?\n/)) {
              const m = line.match(/^\/(safe-term|accept|reject)\s+(.+)\$/);
              if (m) commands.push({ cmd: m[1], term: m[2].trim() });
            }
            console.log(JSON.stringify(commands));
          ")

          if [ "$COMMANDS" = "[]" ]; then
            echo "No valid /safe-term, /accept, or /reject command found in comment - ignoring."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_JSON=$(gh pr view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json headRefName,labels)
          HEAD_REF=$(echo "$PR_JSON" | node -e "console.log(JSON.parse(require('fs').readFileSync(0,'utf8')).headRefName)")
          HAS_LABEL=$(echo "$PR_JSON" | node -e "console.log(JSON.parse(require('fs').readFileSync(0,'utf8')).labels.some(l => l.name === 'translations'))")

          if [ "$HAS_LABEL" != "true" ]; then
            echo "PR doesn't have the 'translations' label - not a flagged-review PR, ignoring."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "commands=$COMMANDS" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: "Checkout PR branch"
        if: steps.extract.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.extract.outputs.head_ref }}
          fetch-depth: 0

      - name: "Process review commands"
        if: steps.extract.outputs.found == 'true'
        env:
          COMMANDS_JSON: ${{ steps.extract.outputs.commands }}
          PROFANITY_REPO_TOKEN: ${{ secrets.PROFANITY_REPO_TOKEN }}
          CROWDIN_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_PROJECT_ID_LANG: ${{ vars.CROWDIN_PROJECT_ID_LANG }}
          CROWDIN_PROJECT_ID_WEBSITE: ${{ vars.CROWDIN_PROJECT_ID_WEBSITE }}
        run: node .github/scripts/process-pr-commands.js

      - name: "Commit, push, and update PR"
        if: steps.extract.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_SLUG_LANG: EuphoriaPatchesShader
          CROWDIN_PROJECT_SLUG_WEBSITE: EuphoriaPatchesWebsite
        run: |
          STATUS=$(node -e "console.log(require('./_safe-term-result.json').status)")

          if [ "$STATUS" = "processed" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add -- '.github/data/safe-term-exceptions.json' '*.lang' 'website/*.json' '_flagged-report.json'

            if git diff --cached --quiet; then
              echo "Nothing to commit (no command matched a flagged item)."
            else
              git commit -m "[translation] Process PR review commands"
              git push origin "${{ steps.extract.outputs.head_ref }}"

              node .github/scripts/build-pr-body.js
              gh pr edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file pr-body.md
            fi

            REPLY=$(node -e "console.log(require('./_safe-term-result.json').reply)")
            REMAINING=$(node -e "console.log(require('./_safe-term-result.json').remainingCount)")

            if [ "$REMAINING" = "0" ]; then
              # Squash so the whole review history (initial flagged apply +
              # every accept/reject/safe-term commit) collapses into a
              # single commit on the target branch instead of showing every
              # intermediate step.
              if MERGE_OUTPUT=$(gh pr merge "${{ github.event.issue.number }}" \
                  --repo "${{ github.repository }}" \
                  --squash --delete-branch 2>&1); then
                REPLY="$REPLY"$'\n\n'"All flagged items are cleared. This PR was squash-merged and its branch deleted automatically."
              else
                echo "gh pr merge failed: $MERGE_OUTPUT"
                REPLY="$REPLY"$'\n\n'"All flagged items are cleared, but auto-merge failed (branch protection or required checks?) - see the workflow run for details. Merge manually when ready."
              fi
            fi
          elif [ "$STATUS" = "not-found" ]; then
            REPLY=$(node -e "console.log(require('./_safe-term-result.json').reply)")
          else
            REPLY="Something went wrong processing these commands - check the workflow run for details."
          fi

          gh pr comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "$REPLY"
