name: "Crowdin Translations"
run-name: "Crowdin Translations #${{ github.run_number }}"

on:
  push:
    branches: [main]
    paths:
      - "en_US.lang"
      - "website/en.json"
  workflow_dispatch:
    inputs:
      upload_translations:
        description: "Also upload existing repo translations to Crowdin (one-time seeding)"
        type: boolean
        default: false
        required: true
      test_mode:
        description: "Target main-test instead of main (for validating this workflow)"
        type: boolean
        default: false
        required: true
  schedule:
    # Runs after update-en-US.yml (midnight UTC), so any freshly pulled
    # English strings are pushed to Crowdin the same night.
    - cron: "0 2 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LOCALIZATION_BRANCH: l10n_crowdin_translations
  TARGET_BRANCH: ${{ (github.event_name == 'workflow_dispatch' && inputs.test_mode) && 'main-test' || 'main' }}
  CROWDIN_PROJECT_SLUG_LANG: EuphoriaPatchesShader
  CROWDIN_PROJECT_SLUG_WEBSITE: EuphoriaPatchesWebsite

permissions:
  contents: write
  pull-requests: write

jobs:
  check-source-changes:
    name: "Check for source changes"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      lang_changed: ${{ steps.check.outputs.lang_changed }}
      website_changed: ${{ steps.check.outputs.website_changed }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Check for recent changes to source files"
        id: check
        # The nightly schedule fires every 2 AM UTC regardless of whether
        # en_US.lang/en.json actually changed since the last run. Skip the
        # upload step when there's nothing new to push to Crowdin.
        run: |
          if [ -n "$(git log --since='25 hours ago' --format= -- en_US.lang)" ]; then
            echo "lang_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "lang_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$(git log --since='25 hours ago' --format= -- website/en.json)" ]; then
            echo "website_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "website_changed=false" >> "$GITHUB_OUTPUT"
          fi

  # sync-lang and sync-website only talk to their own Crowdin project and
  # never touch git (push_sources/push_translations: false) - they just
  # produce artifacts. That means they can safely run in parallel; only
  # process-changes (below) ever writes to a branch.
  sync-lang:
    name: "Sync Shader Lang"
    runs-on: ubuntu-latest
    needs: [check-source-changes]
    if: always() && (needs.check-source-changes.result == 'success' || needs.check-source-changes.result == 'skipped')
    outputs:
      has_changes: ${{ steps.check-changes.outputs.has_changes || 'false' }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Crowdin (Shader Lang)"
        uses: crowdin/github-action@v2
        with:
          upload_sources: ${{ github.event_name != 'schedule' || needs.check-source-changes.outputs.lang_changed == 'true' }}
          upload_translations: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_translations }}
          download_translations: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          push_sources: false
          push_translations: false
          skip_untranslated_strings: false
          config: .github/config/crowdin_lang.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_PROJECT_ID_LANG: ${{ vars.CROWDIN_PROJECT_ID_LANG }}

      - name: "Fix workspace ownership"
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        # The Crowdin action runs in a Docker container as root, which leaves
        # the checked-out workspace root-owned. Reclaim it before the next
        # steps read/write files as the normal runner user.
        run: sudo chown -R "$(id -u):$(id -g)" .

      - name: "Check for changes"
        id: check-changes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "$(git status --porcelain -- '*.lang')" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Upload lang files artifact"
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lang-files
          path: "*.lang"
          retention-days: 1

  sync-website:
    name: "Sync Website"
    runs-on: ubuntu-latest
    needs: [check-source-changes]
    if: always() && (needs.check-source-changes.result == 'success' || needs.check-source-changes.result == 'skipped')
    outputs:
      has_changes: ${{ steps.check-changes.outputs.has_changes || 'false' }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Crowdin (Website)"
        uses: crowdin/github-action@v2
        with:
          upload_sources: ${{ github.event_name != 'schedule' || needs.check-source-changes.outputs.website_changed == 'true' }}
          upload_translations: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_translations }}
          download_translations: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          push_sources: false
          push_translations: false
          skip_untranslated_strings: false
          config: .github/config/crowdin_website.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_PROJECT_ID_WEBSITE: ${{ vars.CROWDIN_PROJECT_ID_WEBSITE }}

      - name: "Fix workspace ownership"
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: sudo chown -R "$(id -u):$(id -g)" .

      - name: "Check for changes"
        id: check-changes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "$(git status --porcelain -- 'website/*.json')" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Upload website files artifact"
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: website-files
          path: "website/*.json"
          retention-days: 1

  process-changes:
    name: "Split Clean/Flagged and Commit"
    runs-on: ubuntu-latest
    needs: [sync-lang, sync-website]
    if: |
      always() &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      (needs.sync-lang.outputs.has_changes == 'true' || needs.sync-website.outputs.has_changes == 'true')
    outputs:
      has_flagged_changes: ${{ steps.flagged-check.outputs.has_flagged_changes || 'false' }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: "Prepare target branch"
        run: |
          if [ "${{ env.TARGET_BRANCH }}" != "main" ]; then
            if git ls-remote --exit-code --heads origin "${{ env.TARGET_BRANCH }}" > /dev/null 2>&1; then
              git fetch origin "${{ env.TARGET_BRANCH }}"
              git checkout "${{ env.TARGET_BRANCH }}"
            else
              git checkout -b "${{ env.TARGET_BRANCH }}"
            fi
          fi

      - name: "Download lang files"
        if: needs.sync-lang.outputs.has_changes == 'true'
        uses: actions/download-artifact@v4
        with:
          name: lang-files
          path: _new

      - name: "Download website files"
        if: needs.sync-website.outputs.has_changes == 'true'
        uses: actions/download-artifact@v4
        with:
          name: website-files
          path: _new/website

      - name: "Split changes into clean and flagged"
        run: node .github/scripts/split-by-content-safety.js
        env:
          PROFANITY_REPO_TOKEN: ${{ secrets.PROFANITY_REPO_TOKEN }}

      - name: "Restore intentionally empty lang keys (clean set)"
        run: node .github/scripts/restore-empty-lang-keys.js

      - name: "Configure Git"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: "Commit and push clean changes to target branch"
        run: |
          git add -- '*.lang' 'website/*.json'
          if git diff --cached --quiet; then
            echo "No clean changes to commit."
          else
            MSG=""
            if [ "${{ needs.sync-lang.outputs.has_changes }}" = "true" ]; then
              MSG="Update shader lang translations"
            fi
            if [ "${{ needs.sync-website.outputs.has_changes }}" = "true" ]; then
              if [ -n "$MSG" ]; then
                MSG="$MSG and website translations"
              else
                MSG="Update website translations"
              fi
            fi
            git commit -m "[translation] $MSG"
            git push origin "${{ env.TARGET_BRANCH }}"
          fi

      - name: "Check for flagged content"
        id: flagged-check
        run: |
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('_flagged-report.json','utf8')).length)")
          if [ "$COUNT" -gt 0 ]; then
            echo "has_flagged_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_flagged_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Commit and push flagged changes to localization branch"
        if: steps.flagged-check.outputs.has_flagged_changes == 'true'
        run: |
          git checkout -B "${{ env.LOCALIZATION_BRANCH }}"
          node .github/scripts/apply-flagged-report.js
          node .github/scripts/restore-empty-lang-keys.js
          git add -- '*.lang' 'website/*.json'
          git commit -m "[translation] Flagged translations pending review"
          git push --force origin "${{ env.LOCALIZATION_BRANCH }}"

      - name: "Upload flagged report"
        if: steps.flagged-check.outputs.has_flagged_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flagged-report
          path: _flagged-report.json
          retention-days: 1

  create-pr:
    name: "Create Pull Request"
    runs-on: ubuntu-latest
    needs: [process-changes]
    if: |
      always() &&
      needs.process-changes.outputs.has_flagged_changes == 'true'
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Download flagged report"
        uses: actions/download-artifact@v4
        with:
          name: flagged-report

      - name: "Build PR body"
        id: body
        run: |
          {
            echo "body<<EOF"
            echo "New translations from Crowdin were flagged by the content safety check and need manual review before merging."
            echo ""
            echo "### Flagged items"
            node -e "
              const items = JSON.parse(require('fs').readFileSync('_flagged-report.json', 'utf8'));
              const slugs = { lang: '${{ env.CROWDIN_PROJECT_SLUG_LANG }}', website: '${{ env.CROWDIN_PROJECT_SLUG_WEBSITE }}' };
              const labels = {
                'no-wordlist-coverage': 'no profanity wordlist for this language yet - needs one added',
                'profanity-match': 'profanity match',
                'suspicious-url': 'URL not found in the English source or whitelist',
                'homoglyph-url': 'URL contains mixed-script (lookalike) characters',
                'phone-number': 'phone number detected',
                'html-injection': 'HTML/script injection pattern',
                'spam-repetition': 'repeated character/word spam pattern',
              };
              for (const item of items) {
                const isWebsite = item.file.startsWith('website/');
                const slug = isWebsite ? slugs.website : slugs.lang;
                const link = 'https://crowdin.com/project/' + slug;
                const reasonText = item.reasons.map((r) => labels[r] || r).join('; ');
                console.log('- **' + item.file + '** \`' + item.key + '\` (' + item.language + ') - ' + reasonText);
                console.log('  - Matched: ' + item.matchedWords.join(', '));
                console.log('  - Old: ' + JSON.stringify(item.oldValue));
                console.log('  - New: ' + JSON.stringify(item.newValue));
                console.log('  - [Review in Crowdin](' + link + ') - search for the key above');
              }
            "
            echo ""
            echo "### If rejected"
            echo "Delete or fix the translation directly in Crowdin using the links above, so it isn't proposed again unchanged."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "Create Pull Request"
        uses: devops-infra/action-pull-request@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: ${{ env.LOCALIZATION_BRANCH }}
          target_branch: ${{ env.TARGET_BRANCH }}
          label: "translations"
          title: "Flagged Crowdin translations for review"
          body: ${{ steps.body.outputs.body }}
